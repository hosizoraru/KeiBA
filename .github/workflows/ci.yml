name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Resolve app version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      marketing_version: ${{ steps.version.outputs.marketing_version }}
      build_version: ${{ steps.version.outputs.build_version }}
      artifact_version: ${{ steps.version.outputs.artifact_version }}
      artifact_slug: ${{ steps.version.outputs.artifact_slug }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version metadata
        id: version
        run: scripts/ci/resolve_app_version.sh

  build-and-test:
    name: Xcode build and tests
    runs-on: macos-26
    timeout-minutes: 45
    needs: version
    env:
      SWIFTPM_CACHE_PATH: ${{ github.workspace }}/.build/xcode-sourcepackages
      APP_MARKETING_VERSION: ${{ needs.version.outputs.marketing_version }}
      APP_BUILD_VERSION: ${{ needs.version.outputs.build_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: |
          xcode_path="/Applications/Xcode_26.4.1.app/Contents/Developer"
          if [ ! -d "$xcode_path" ]; then
            echo "::error::Xcode 26.4.1 is required for CI simulator builds."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_path" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          sw_vers
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version
          xcode-select -p

      - name: Cache Swift package checkouts
        uses: actions/cache@v5
        with:
          path: ${{ env.SWIFTPM_CACHE_PATH }}
          key: ${{ runner.os }}-xcode-26.4.1-spm-${{ hashFiles('KeiBAOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.4.1-spm-

      - name: Validate localized strings
        run: |
          jq empty KeiBAOS/Localizable.xcstrings
          jq empty KeiBAOSLiveActivities/Localizable.xcstrings
          jq empty KeiBAOSWatch/Localizable.xcstrings
          jq empty KeiBAOSWatchWidgets/Localizable.xcstrings

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH"

      - name: Resolve iOS test simulator
        id: ios-simulator
        run: |
          set -euo pipefail
          ios_sim_udid="$(
            xcrun simctl list devices available --json | jq -r '
              [
                .devices
                | to_entries[]
                | .value[]
                | select(.isAvailable == true and .name == "iPhone 17 Pro")
                | .udid
              ][0] // empty
            '
          )"
          if [ -z "$ios_sim_udid" ]; then
            ios_sim_udid="$(
              xcrun simctl list devices available --json | jq -r '
                [
                  .devices
                  | to_entries[]
                  | .value[]
                  | select(.isAvailable == true and (.name | startswith("iPhone")))
                  | .udid
                ][0] // empty
              '
            )"
          fi
          if [ -z "$ios_sim_udid" ]; then
            echo "::error::No available iPhone simulator found."
            xcrun simctl list devices available
            exit 1
          fi
          echo "destination=platform=iOS Simulator,id=$ios_sim_udid" >> "$GITHUB_OUTPUT"
          xcrun simctl list devices available | grep "$ios_sim_udid" || true

      - name: Build iOS simulator
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-iOS" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS tests
        run: |
          xcodebuild build-for-testing \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination '${{ steps.ios-simulator.outputs.destination }}' \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-tests-iOS" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS unit tests
        run: |
          xcodebuild test-without-building \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination '${{ steps.ios-simulator.outputs.destination }}' \
            -destination-timeout 60 \
            -parallel-testing-enabled NO \
            -testLanguage en \
            -testRegion US \
            -resultBundlePath "$RUNNER_TEMP/KeiBAOS-iOS-unit.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-tests-iOS" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS widgets and Live Activities extension
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOSLiveActivities \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-live-activities" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS simulator
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOSWatch \
            -destination 'generic/platform=watchOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-watchOS" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build watchOS widgets extension
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOSWatchWidgets \
            -destination 'generic/platform=watchOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-watchOS-widgets" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build macOS tests
        run: |
          xcodebuild build-for-testing \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-tests-macOS" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run macOS unit tests
        continue-on-error: true
        run: |
          xcodebuild test-without-building \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'platform=macOS' \
            -parallel-testing-enabled NO \
            -testLanguage en \
            -testRegion US \
            -resultBundlePath "$RUNNER_TEMP/KeiBAOS-macOS-unit.xcresult" \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-tests-macOS" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Xcode test results
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: KeiBAOS-Xcode-test-results
          path: ${{ runner.temp }}/KeiBAOS-*.xcresult
          if-no-files-found: ignore
          retention-days: 7

  package-ios-ipa:
    name: Build unsigned iOS IPA
    runs-on: macos-26
    timeout-minutes: 45
    if: github.event_name != 'pull_request'
    needs: version
    env:
      SWIFTPM_CACHE_PATH: ${{ github.workspace }}/.build/xcode-sourcepackages
      APP_MARKETING_VERSION: ${{ needs.version.outputs.marketing_version }}
      APP_BUILD_VERSION: ${{ needs.version.outputs.build_version }}
      ARTIFACT_SLUG: ${{ needs.version.outputs.artifact_slug }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: |
          xcode_path="/Applications/Xcode_26.4.1.app/Contents/Developer"
          if [ ! -d "$xcode_path" ]; then
            echo "::error::Xcode 26.4.1 is required for CI simulator builds."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_path" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          sw_vers
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Cache Swift package checkouts
        uses: actions/cache@v5
        with:
          path: ${{ env.SWIFTPM_CACHE_PATH }}
          key: ${{ runner.os }}-xcode-26.4.1-spm-${{ hashFiles('KeiBAOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.4.1-spm-

      - name: Build unsigned iOS IPA payload
        run: |
          set -euo pipefail
          derived_data="$RUNNER_TEMP/KeiBAOS-iOS-Device"
          artifacts="$RUNNER_TEMP/KeiBAOS-artifacts"
          app_path="$derived_data/Build/Products/Release-iphoneos/KeiBAOS.app"
          payload_root="$artifacts/iphoneos"
          payload_dir="$payload_root/Payload"

          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$derived_data" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

          test -d "$app_path"
          rm -rf "$payload_root"
          mkdir -p "$payload_dir" "$artifacts"
          ipa_path="$artifacts/KeiBAOS-iOS-$ARTIFACT_SLUG-unsigned.ipa"
          ditto "$app_path" "$payload_dir/KeiBAOS.app"
          (
            cd "$payload_root"
            COPYFILE_DISABLE=1 zip -qry "$ipa_path" Payload
          )
          du -h "$ipa_path"

      - name: Upload unsigned iOS IPA
        uses: actions/upload-artifact@v7
        with:
          name: KeiBAOS-iOS-${{ needs.version.outputs.artifact_slug }}-unsigned
          path: ${{ runner.temp }}/KeiBAOS-artifacts/KeiBAOS-iOS-${{ needs.version.outputs.artifact_slug }}-unsigned.ipa
          if-no-files-found: error
          retention-days: 14

  package-macos-dmg:
    name: Build unsigned macOS DMG
    runs-on: macos-26
    timeout-minutes: 45
    if: github.event_name != 'pull_request'
    needs: version
    env:
      SWIFTPM_CACHE_PATH: ${{ github.workspace }}/.build/xcode-sourcepackages
      APP_MARKETING_VERSION: ${{ needs.version.outputs.marketing_version }}
      APP_BUILD_VERSION: ${{ needs.version.outputs.build_version }}
      ARTIFACT_SLUG: ${{ needs.version.outputs.artifact_slug }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select Xcode 26.4.1
        run: |
          xcode_path="/Applications/Xcode_26.4.1.app/Contents/Developer"
          if [ ! -d "$xcode_path" ]; then
            echo "::error::Xcode 26.4.1 is required for CI simulator builds."
            find /Applications -maxdepth 1 -name 'Xcode*.app' -print || true
            exit 1
          fi
          echo "DEVELOPER_DIR=$xcode_path" >> "$GITHUB_ENV"

      - name: Show toolchain
        run: |
          sw_vers
          echo "DEVELOPER_DIR=$DEVELOPER_DIR"
          xcodebuild -version
          xcodebuild -showsdks

      - name: Cache Swift package checkouts
        uses: actions/cache@v5
        with:
          path: ${{ env.SWIFTPM_CACHE_PATH }}
          key: ${{ runner.os }}-xcode-26.4.1-spm-${{ hashFiles('KeiBAOS.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-xcode-26.4.1-spm-

      - name: Build unsigned macOS DMG
        run: |
          set -euo pipefail
          derived_data="$RUNNER_TEMP/KeiBAOS-macOS-Release"
          artifacts="$RUNNER_TEMP/KeiBAOS-artifacts"
          app_path="$derived_data/Build/Products/Release/KeiBAOS.app"
          dmg_stage="$RUNNER_TEMP/KeiBAOS-dmg"
          dmg_path="$artifacts/KeiBAOS-macOS-$ARTIFACT_SLUG-unsigned.dmg"

          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$derived_data" \
            -clonedSourcePackagesDirPath "$SWIFTPM_CACHE_PATH" \
            MARKETING_VERSION="$APP_MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_BUILD_VERSION" \
            CODE_SIGNING_ALLOWED=NO

          test -d "$app_path"
          rm -rf "$dmg_stage"
          mkdir -p "$dmg_stage" "$artifacts"
          ditto "$app_path" "$dmg_stage/KeiBAOS.app"
          ln -s /Applications "$dmg_stage/Applications"
          hdiutil create \
            -volname KeiBAOS \
            -srcfolder "$dmg_stage" \
            -ov \
            -format UDZO \
            "$dmg_path"
          du -h "$dmg_path"

      - name: Upload unsigned macOS DMG
        uses: actions/upload-artifact@v7
        with:
          name: KeiBAOS-macOS-${{ needs.version.outputs.artifact_slug }}-unsigned
          path: ${{ runner.temp }}/KeiBAOS-artifacts/KeiBAOS-macOS-${{ needs.version.outputs.artifact_slug }}-unsigned.dmg
          if-no-files-found: error
          retention-days: 14
