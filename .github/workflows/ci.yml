name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Xcode build and tests
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcode-select -p

      - name: Validate localized strings
        run: jq empty KeiBAOS/Localizable.xcstrings

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS

      - name: Build iOS simulator
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-iOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build macOS
        run: |
          xcodebuild build \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'generic/platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-macOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Run macOS unit tests
        run: |
          xcodebuild test \
            -project KeiBAOS.xcodeproj \
            -scheme KeiBAOS \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/KeiBAOS-tests" \
            CODE_SIGNING_ALLOWED=NO
